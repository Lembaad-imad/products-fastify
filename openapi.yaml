openapi: 3.0.3
info:
  title: Products API
  version: 1.0.0
  description: >
    API for managing products. Clients can push (create) new products
    (single or in bulk) and retrieve the list of available products.
    Includes user registration, login, and JWT-based authentication.

servers:
  - url: http://localhost:3000/api

security:
  - bearerAuth: []

paths:
  /products:
    get:
      summary: List all products
      operationId: listProducts
      security: []
      responses:
        '200':
          description: A list of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'

    post:
      summary: Push a new product
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewProduct'
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Invalid input
        '401':
          description: Missing or invalid token

  /products/bulk:
    post:
      summary: Push multiple products at once
      operationId: createProductsBulk
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              minItems: 1
              maxItems: 500
              items:
                $ref: '#/components/schemas/NewProduct'
      responses:
        '201':
          description: Products created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
        '400':
          description: Invalid input
        '401':
          description: Missing or invalid token

  /products/{id}:
    patch:
      summary: Update an existing product
      operationId: updateProduct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProduct'
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Invalid input
        '401':
          description: Missing or invalid token
        '404':
          description: Product not found

  /ping:
    get:
      summary: Health check
      operationId: ping
      security: []
      responses:
        '200':
          description: Pong
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "pong"

  /register:
    post:
      summary: Register a new user
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewUser'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /login:
    post:
      summary: Log in a user
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    NewProduct:
      type: object
      additionalProperties: false
      required:
        - name
        - description
        - price
      properties:
        name:
          type: string
          example: "Wireless Mouse"
        description:
          type: string
          example: "Ergonomic wireless mouse with USB receiver"
        price:
          type: number
          format: float
          example: 19.99
        quantity:
          type: integer
          example: 100
          default: 0

    UpdateProduct:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name:
          type: string
          example: "Wireless Mouse"
        description:
          type: string
          example: "Ergonomic wireless mouse with USB receiver"
        price:
          type: number
          format: float
          example: 24.99
        quantity:
          type: integer
          example: 80

    Product:
      allOf:
        - $ref: '#/components/schemas/NewProduct'
        - type: object
          properties:
            id:
              type: string
              format: uuid
              example: "a1b2c3d4-5678-90ab-cdef-1234567890ab"
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
            User:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                name:
                  type: string
                  example: "Jane Doe"
                email:
                  type: string
                  format: email
                  example: "jane@example.com"

    NewUser:
      type: object
      additionalProperties: false
      required:
        - email
        - password
      properties:
        name:
          type: string
          example: "Jane Doe"
        email:
          type: string
          format: email
          example: "jane@example.com"
        password:
          type: string
          format: password
          example: "Str0ngPassw0rd!"

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "a1b2c3d4-5678-90ab-cdef-1234567890ab"
        name:
          type: string
          example: "Jane Doe"
        email:
          type: string
          format: email
          example: "jane@example.com"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RegisterResponse:
      type: object
      properties:
        message:
          type: string
          example: "Compte cree avec succes"
        user:
          type: object
          properties:
            id:
              type: string
              format: uuid
              example: "a1b2c3d4-5678-90ab-cdef-1234567890ab"
            name:
              type: string
              example: "Jane Doe"
            email:
              type: string
              format: email
              example: "jane@example.com"

    LoginRequest:
      type: object
      additionalProperties: false
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: "jane@example.com"
        password:
          type: string
          format: password
          example: "Str0ngPassw0rd!"

    LoginResponse:
      type: object
      properties:
        message:
          type: string
          example: "Connexion reussie"
        accessToken:
          type: string
          description: JWT access token (short-lived)
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        refreshToken:
          type: string
          description: JWT refresh token (long-lived)
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        user:
          type: object
          properties:
            name:
              type: string
              example: "Jane Doe"
            email:
              type: string
              format: email
              example: "jane@example.com"

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "email ou mot de passe incorrect"